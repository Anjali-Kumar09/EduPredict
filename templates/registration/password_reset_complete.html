{% extends 'base.html' %}

{% block title %}Password Reset Complete | EduPredict{% endblock %}

{% block content %}
<div class="auth-container">

    <div class="auth-card">

        <div class="auth-header">

            <i class="fas fa-check-circle auth-icon success"></i>

            <h2>Password Updated</h2>

            <p>
                Your password has been changed successfully.
                You can now log in to your EduPredict account.
            </p>

        </div>

        <a href="{% url 'login' %}" class="auth-btn-link">
            Login Now
        </a>

    </div>

</div>
{% endblock %}
