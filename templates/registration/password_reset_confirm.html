{% extends 'base.html' %}

{% block title %}Set New Password | EduPredict{% endblock %}

{% block content %}
<div class="auth-container">

    <div class="auth-card">

        <div class="auth-header">
            <i class="fas fa-lock auth-icon"></i>
            <h2>Create New Password</h2>
            <p>
                Enter your new password below.
            </p>
        </div>

        <form method="post">
            {% csrf_token %}

            <div class="input-box">
                <i class="fas fa-lock"></i>
                <input type="password"
                       name="new_password1"
                       placeholder="New Password"
                       required>
            </div>

            <div class="input-box">
                <i class="fas fa-check-circle"></i>
                <input type="password"
                       name="new_password2"
                       placeholder="Confirm Password"
                       required>
            </div>

            <button type="submit" class="auth-btn">
                Change Password
            </button>

        </form>

    </div>

</div>
{% endblock %}
