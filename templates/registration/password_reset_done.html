{% extends 'base.html' %}

{% block title %}Email Sent | EduPredict{% endblock %}

{% block content %}
<div class="auth-container">

    <div class="auth-card">

        <div class="auth-header">

            <i class="fas fa-paper-plane auth-icon success"></i>

            <h2>Email Sent</h2>

            <p>
                We've emailed instructions for setting your password.
                Please check your inbox and spam folder.
            </p>

        </div>

        <a href="{% url 'login' %}" class="auth-btn-link">
            Back to Login
        </a>

    </div>

</div>
{% endblock %}
